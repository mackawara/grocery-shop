name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: |
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}

            Additional required check — Flow JSON ↔ handler contract.

            WhatsApp Flow JSONs are married to their backend handler by the
            `flow_token`: it is the identifier that routes a completed flow to the
            code that processes it (e.g. `ORDER_DETAILS_FLOW_TOKEN` in
            `src/constants/orderFlow.ts` routes the order flow to `orderFlowHandler`
            in `src/controllers/whatsapp/orderFlowHandler.ts`). All tenants share the
            same handler code, so a flow whose payload the handler cannot process
            breaks that flow at runtime for everyone.

            For every change in this PR to a flow JSON (any `*_FLOW_JSON` definition,
            e.g. `ORDER_FLOW_JSON`), follow its `flow_token` to the handler and verify
            the contract still holds:
              - The flow's `flow_token` maps to exactly one handler (the routing for
                that token exists).
              - Every field the flow emits — the `complete` / `data_exchange`
                `on-click-action` payload keys, plus any screen `data` keys — is
                consumed by that handler with matching name and type (e.g. the
                `OrderFlowResponse` contract).
              - No field the handler reads has been renamed, removed, or retyped
                without a corresponding update to the handler.
              - Newly added required fields are actually handled, not silently dropped.

            Treat any flow JSON change that the handler keyed on its `flow_token`
            cannot fully process as a blocking issue.

            Additional required check — CSRF guard coverage on browser-facing routes.

            `csrfGuard` (`src/controllers/middleware/csrf.ts`) is the second layer of
            CSRF defence for the cookie-session, browser-facing dashboard routes. It
            must be mounted on every route group that authenticates via session cookies
            and serves the Vendor Dashboard / admin / auth surface, and it must NOT be
            mounted on the server-to-server webhook routes (`/whatsapp`, `/payments`),
            which legitimately arrive with no `Origin`/`Referer` and would break under
            the guard. Today it is mounted in `src/server.ts` on `/auth`, `/dashboard`,
            and `/admin`.

            For any change in this PR that adds, renames, or re-mounts a route group
            (an `app.use('/<prefix>', ...)` in `src/server.ts`, or a new `*.routes.ts`),
            verify:
              - Every new or changed browser-facing, cookie-session route group is
                mounted WITH `csrfGuard` in its `app.use(...)` chain (before the router).
              - `csrfGuard` is NOT added to the WhatsApp or Paynow webhook route groups
                (`/whatsapp`, `/payments`) — doing so is also a defect.
              - The guard was not removed or reordered after the route handlers such
                that state-changing requests reach a handler without passing through it.

            Treat a new browser-facing/cookie-session route group mounted without
            `csrfGuard`, or `csrfGuard` removed from `/auth`, `/dashboard`, or `/admin`,
            as a blocking issue. If you cannot tell whether a new route group is
            browser-facing or server-to-server, flag it and ask rather than assuming.
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
